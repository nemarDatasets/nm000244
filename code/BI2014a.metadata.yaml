methodology: 'The experiment was designed to study the viability of a calibration-less P300-based BCI system with dry electrodes.
  Visual P300 is an event-related potential (ERP) elicited by an expected but unpredictable target visual stimulation (oddball
  paradigm), with peaking amplitude 240-600 ms after stimulus onset. Two event-related stimuli: Target (P300 expected) and
  Non-Target (no P300). The experiment used Brain Invaders, a P300-based BCI open-source software. A repetition is composed
  of 12 flashes (one for each group), of which two include the Target symbol (Target flashes) and 10 do not (non-Target flashes).
  The ratio of Target versus non-Target epochs in the whole datasets is one-to-five. During the experiment, the output of
  a real-time adaptive Riemannian Minimum Distance to Mean (RMDM) classifier was used for assessing the participants'' command.
  Game session was compounded by nine levels, consisting in a unique and predefined configuration of the 36 symbols of the
  interface. Players had up to eight attempts to destroy the target symbol. If the player missed all eight attempts, the level
  was started once again from the beginning. Average duration of five minutes for the nine levels. Experimenter could end
  the experiment if no control over the BCI system was gained after 10 minutes.'
