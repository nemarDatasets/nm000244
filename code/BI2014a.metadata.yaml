abstract: We describe the experimental procedures for the bi2014a dataset that contains electroencephalographic (EEG) recordings
  of 71 subjects playing to a visual P300 Brain-Computer Interface (BCI) videogame named Brain Invaders. The interface uses
  the oddball paradigm on a grid of 36 symbols (1 Target, 35 Non-Target) that are flashed pseudo-randomly to elicit the P300
  response. EEG data were recorded using 16 active dry electrodes with up to three game sessions. The experiment took place
  at GIPSA-lab, Grenoble, France, in 2014.
